
<div>
  <app-state-view
  [state]="viewState()"
  loadingMessage="Loading books"
  emptyIcon="menu_book"
  emptyTitle="book not found"
  emptyMessage="Error fetching book details"
  [errorMessage]="errorMessage() ?? 'Failed to load books. Please try again.'"
  >
  <div>
    <h1>{{ book()!.title }}</h1>
    <p>Author: {{ book()!.author }}</p>
    <p>Status: {{ book()!.bookState }}</p>
    <button (click)="onBorrow()"
    [disabled]="book()?.bookState === 'Borrowed'">
    {{ book()?.bookState === 'Borrowed' ? 'Already Borrowed' : 'Borrow' }}
  </button>
  </div>
</app-state-view>
</div>

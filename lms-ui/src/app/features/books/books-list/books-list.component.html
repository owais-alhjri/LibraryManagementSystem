<div class="page">
  <div class="page-header">
    <h1>Books</h1>

    @if (auth.canManageBooks()) {
      <button mat-raised-button color="primary" routerLink="/admin/add-book">
        <mat-icon>add</mat-icon>
        Add Book
      </button>
    }
  </div>

  <!-- Search -->
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search books</mat-label>
    <input
      matInput
      [formControl]="searchControl"
      placeholder="Title or author..."
    />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

<app-state-view
  [state]="viewState()"
  loadingMessage="Loading books"
  emptyIcon="menu_book"
  emptyTitle="No book found"
  emptyMessage="Try adjusting your search."
  [errorMessage]="errorMessage() ?? 'Failed to load books. Please try again.'"
  >
  <div class="books-grid">
    @for (book of books(); track book.id) {
      <app-book-card [book]="book" 
      (deleted)="onBookDeleted($event)"
      (borrow)="onBorrow($event)" />
    }
  </div>

      <!-- Pagination -->
      <mat-paginator
        [length]="totalCount()"
        [pageSize]="pageSize()"
        [pageSizeOptions]="[5, 10, 25]"
        [pageIndex]="page() - 1"
        (page)="onPageChange($event)"
        showFirstLastButtons
      />
</app-state-view>
</div>

<div class="page">
  <h1>My Borrowed Books</h1>

  <app-state-view
    [state]="viewState()"
    loadingMessage="Loading your borrowed books..."
    emptyIcon="menu_book"
    emptyTitle="No borrowed books found"
    [errorMessage]="errorMessage() ?? 'Failed to load borrow records.'"
  >
    <div class="borrowed-grid">
      @for (borrowed of borrows(); track borrowed.id) {
        <div class="borrow-card">
          <h2>{{ borrowed.bookTitle }}</h2>
          <p>Borrowed: {{ borrowed.borrowedDate | date:'mediumDate' }}</p>
          <p class="status" [class.returned]="borrowed.status === 'Returned'">
            {{ borrowed.status }}
          </p>
          <button
            (click)="onReturn(borrowed)"
            [disabled]="borrowed.status === 'Returned'">
            {{ borrowed.status === 'Returned' ? 'Already Returned' : 'Return' }}
          </button>
        </div>
      }
    </div>
  </app-state-view>
</div>
